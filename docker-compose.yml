services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketpass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ticketpass
      POSTGRES_USER: ticketpass
      POSTGRES_PASSWORD: ticketpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketpass -d ticketpass"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
