spring:
  application:
    name: ticketpass-api
  datasource:
    url: jdbc:postgresql://localhost:5432/ticketpass
    username: ticketpass
    password: ticketpass
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

ticketpass:
  security:
    allowed-origins:
      - http://localhost:3000
  reservations:
    expiration-interval-ms: 60000
  payments:
    provider: mock
    reconciliation-interval-ms: ${PAYMENT_RECONCILIATION_INTERVAL_MS:5000}
    reconciliation-batch-size: ${PAYMENT_RECONCILIATION_BATCH_SIZE:100}
    frontend-base-url: ${TICKETPASS_FRONTEND_BASE_URL:http://localhost:3000}
    mock:
      enabled: ${MOCK_PAYMENT_ENABLED:true}
      provider-base-url: ${MOCK_PAYMENT_PROVIDER_BASE_URL:http://localhost:8080}
      webhook-secret: ${MOCK_PAYMENT_WEBHOOK_SECRET:}
      webhook-url: ${MOCK_PAYMENT_WEBHOOK_URL:http://localhost:8080/api/payments/webhooks/mock}
      allow-non-loopback: ${MOCK_PAYMENT_ALLOW_NON_LOOPBACK:false}
      delivery-interval-ms: ${MOCK_PAYMENT_DELIVERY_INTERVAL_MS:5000}
  settlement:
    provider: ${SETTLEMENT_PROVIDER:mock}
    enabled: ${SETTLEMENT_ENABLED:true}
    claim-batch-size: ${SETTLEMENT_CLAIM_BATCH_SIZE:20}
    processing-lease-ms: ${SETTLEMENT_PROCESSING_LEASE_MS:120000}
    initial-retry-delay-ms: ${SETTLEMENT_INITIAL_RETRY_DELAY_MS:30000}
    maximum-retry-delay-ms: ${SETTLEMENT_MAXIMUM_RETRY_DELAY_MS:1800000}
    maximum-attempts: ${SETTLEMENT_MAXIMUM_ATTEMPTS:8}
    mock:
      enabled: ${MOCK_SETTLEMENT_ENABLED:true}
      outcome: ${MOCK_SETTLEMENT_OUTCOME:SUCCEEDED}
